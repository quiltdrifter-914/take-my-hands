<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#f8fafc" />
  <title>跑团辅助网页</title>
  <style>
    :root {
      --bg-1: #f1f5f9;
      --bg-2: #ffffff;
      --card: rgba(255, 255, 255, 0.96);
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --primary: #2563eb;
      --primary-soft: #eff6ff;
      --secondary: #f8fafc;
      --warning-soft: #fffbeb;
      --warning-text: #92400e;
      --rose-soft: #fff1f2;
      --rose-text: #881337;
      --gift: #fde68a;
      --danger: #dc2626;
      --danger-dark: #b91c1c;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-1) 100%);
      color: var(--text);
      min-height: 100%;
    }

    body {
      padding: 18px 14px 28px;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
    }

    .fade-in {
      animation: fadeUp 0.28s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .topbar {
      margin-bottom: 14px;
    }

    .topbar-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .app-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .app-subtitle {
      font-size: 13px;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-size: 13px;
      white-space: nowrap;
    }

    .progress-wrap {
      margin-bottom: 12px;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #60a5fa, #2563eb);
      border-radius: 999px;
      transition: width 0.28s ease;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 22px 18px;
      border: 1px solid rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
    }

    .card-title {
      font-size: 28px;
      line-height: 1.25;
      font-weight: 700;
      margin: 0 0 14px;
    }

    .card-title.smaller {
      font-size: 24px;
    }

    .text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--muted);
    }

    .section {
      margin-top: 14px;
      padding: 14px;
      border-radius: var(--radius-lg);
      background: var(--secondary);
    }

    .section.primary {
      background: var(--primary-soft);
    }

    .section.warning {
      background: var(--warning-soft);
      color: var(--warning-text);
    }

    .section.rose {
      background: var(--rose-soft);
      color: var(--rose-text);
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .section.primary .section-title {
      color: #172554;
    }

    .section.primary .text {
      color: #1e3a8a;
    }

    .section.warning .text,
    .section.warning .section-title {
      color: var(--warning-text);
    }

    .section.rose .text,
    .section.rose .section-title {
      color: var(--rose-text);
    }

    ul.tip-list {
      margin: 0;
      padding-left: 18px;
    }

    ul.tip-list li {
      margin: 6px 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .option-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-outline {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 54px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.03);
    }

    .btn-outline:hover {
      background: #f8fafc;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #1e293b;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-dark);
    }

    .arrow {
      color: #94a3b8;
      font-size: 18px;
      flex-shrink: 0;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .history-card {
      margin-top: 14px;
      background: rgba(255,255,255,0.9);
      border-radius: var(--radius-xl);
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.04);
      padding: 18px 16px;
    }

    .history-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .history-item {
      padding: 10px 12px;
      border-radius: 12px;
      background: #f8fafc;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      line-height: 1.8;
      color: #94a3b8;
      padding: 0 4px;
    }

    .reward-wrap {
      text-align: center;
    }

    .gift-button {
      width: 144px;
      height: 144px;
      border: none;
      border-radius: 32px;
      background: linear-gradient(180deg, #fef3c7 0%, var(--gift) 100%);
      box-shadow: inset 0 2px 8px rgba(255,255,255,0.8), 0 12px 28px rgba(217, 119, 6, 0.12);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      margin: 8px 0 4px;
      transition: transform 0.18s ease, box-shadow 0.2s ease;
    }

    .gift-button:active {
      transform: scale(0.96);
    }

    .reward-hidden {
      display: none;
    }

    .reward-show {
      display: block;
      animation: fadeUp 0.28s ease;
    }

    @media (max-width: 380px) {
      .card {
        padding: 18px 14px;
      }

      .card-title {
        font-size: 24px;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar fade-in">
      <div class="topbar-row">
        <div>
          <div class="app-title">跑团辅助网页</div>
          <div class="app-subtitle">适配手机浏览器 / 微信内打开</div>
        </div>
        <div id="progressBadge" class="badge" style="display:none;">进度 0%</div>
      </div>
      <div id="progressWrap" class="progress-wrap" style="display:none;">
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </div>
    </div>

    <div id="pageContainer"></div>

    <div class="actions">
      <button id="homeBtn" class="btn btn-secondary">返回首页</button>
      <button id="resetBtn" class="btn btn-danger">重置进度</button>
    </div>

    <div id="historyCard" class="history-card" style="display:none;">
      <div class="history-title">已做出的选择</div>
      <div id="historyList"></div>
    </div>

    <div class="footer-note">
      这个版本适合先快速替代小程序使用。后续可继续扩展密码输入、图片线索、音频播放、主持人后台配置等功能。
    </div>
  </div>

  <script>
    const STORAGE_KEY = "trpg_helper_progress_v1";

    const STORY_NODES = {
      // 背景图使用方式：
      // 1. 可填网络图片地址，例如：https://.../bg.jpg
      // 2. 也可填相对路径，例如：images/home.jpg
      // 3. 如果某节点不填，则使用默认渐变背景
      // 建议把图片放进 GitHub 仓库里的 images 文件夹，再写成 images/xxx.jpg

      home: {
        id: "home",
        backgroundImage: "image/zzp-.jpg",
        backgroundOverlay: "rgba(15, 23, 42, 0.18)",
        type: "home",
        title: "欢迎来到实景跑团hhhhhh",
        intro: "你将根据页面提示，在现实场景中寻找线索、完成互动，并在关键节点做出选择。请确保全队一起阅读信息。伤害低i经济互发挥v回复i",
        tips: [
          "建议由一人持手机统一操作。",
          "退出后再次进入，会自动保留进度。",
          "如误触可在页面底部重置全部进度。"
        ],
        next: "stage1"
      },
      stage1: {
        id: "stage1",
        backgroundImage: "image/meizi.jpg",
        backgroundOverlay: "rgba(15, 23, 42, 0.18)",
        type: "stage",
        title: "第一关：收到匿名纸条",
        info: "你们在起点处发现一张匿名纸条，上面写着：‘真相不在眼前，而在被忽略的角落。’ 请在现实场景中寻找第一个隐藏标记。",
        question: "找到线索后，请根据你们看到的内容选择下一步。",
        options: [
          { label: "线索指向走廊", next: "stage2" },
          { label: "线索指向储物间", next: "stage3" }
        ]
      },
      stage2: {
        id: "stage2",
        backgroundImage: "image/meizi.jpg",
        backgroundOverlay: "rgba(15, 23, 42, 0.18)",
        type: "stage",
        title: "第二关：走廊的符号",
        info: "你们在走廊尽头发现了一个奇怪符号，旁边还贴着半张旧照片。照片背面似乎有字。",
        question: "你们准备优先查看什么？",
        options: [
          { label: "先解读符号", next: "stage4" },
          { label: "先查看照片背面", next: "stage5" }
        ]
      },
      stage3: {
        id: "stage3",
        backgroundImage: "image/meizi.jpg",
        backgroundOverlay: "rgba(15, 23, 42, 0.18)",
        type: "stage",
        title: "第二关：储物间的箱子",
        info: "储物间角落有一个带密码锁的旧箱子，旁边贴着一句提示：‘答案藏在你最熟悉的地方。’",
        question: "你们接下来想怎么做？",
        options: [
          { label: "返回起点重新寻找数字", next: "stage5" },
          { label: "尝试破解提示含义", next: "stage4" }
        ]
      },
      stage4: {
        id: "stage4",
        backgroundImage: "",
        backgroundOverlay: "rgba(15, 23, 42, 0.18)",
        type: "stage",
        title: "第三关：重复出现的名字",
        info: "你们发现多个地点都出现了同一个名字。这个名字可能与失踪的关键人物有关。",
        question: "根据现场情况，选择你们更相信的方向。",
        options: [
          { label: "这个名字属于受害者", next: "stage6" },
          { label: "这个名字属于误导信息", next: "stage7" }
        ]
      },
      stage5: {
        id: "stage5",
        backgroundImage: "",
        backgroundOverlay: "rgba(15, 23, 42, 0.18)",
        type: "stage",
        title: "第三关：模糊的留言",
        info: "照片背面写着一句模糊留言：‘当钟声响起，记得抬头。’ 你们怀疑某个高处藏有新线索。",
        question: "你们要怎么推进？",
        options: [
          { label: "寻找高处标记", next: "stage6" },
          { label: "回头核对旧线索", next: "stage7" }
        ]
      },
      stage6: {
        id: "stage6",
        backgroundImage: "",
        backgroundOverlay: "rgba(15, 23, 42, 0.18)",
        type: "stage",
        title: "第四关：被撕开的记录",
        info: "你们找到了一份被撕开的记录表，上面缺失了关键时间。剩余部分显示有人刻意隐瞒行踪。",
        question: "你们现在的判断是？",
        options: [
          { label: "有人在制造不在场证明", next: "stage8" },
          { label: "有人在保护真正的线索", next: "stage8" }
        ]
      },
      stage7: {
        id: "stage7",
        backgroundImage: "",
        backgroundOverlay: "rgba(15, 23, 42, 0.18)",
        type: "stage",
        title: "第四关：意外的旁观者",
        info: "你们从另一条线索中发现，现场似乎还有一个从未被提起的旁观者。对方可能看到了关键过程。",
        question: "下一步怎么做？",
        options: [
          { label: "继续追查旁观者身份", next: "stage8" },
          { label: "先整合已有证据", next: "stage8" }
        ]
      },
      stage8: {
        id: "stage8",
        backgroundImage: "",
        backgroundOverlay: "rgba(15, 23, 42, 0.18)",
        type: "stage",
        title: "第五关：拼图完成一半",
        info: "你们已经拿到足够多的碎片信息，但仍缺最后一块：动机。现实场地中还有一个隐藏物件没有被找到。",
        question: "找到隐藏物件后，选择你们看到的结果。",
        options: [
          { label: "物件指向金钱纠纷", next: "stage9" },
          { label: "物件指向私人关系", next: "stage9" }
        ]
      },
      stage9: {
        id: "stage9",
        backgroundImage: "",
        backgroundOverlay: "rgba(15, 23, 42, 0.18)",
        type: "stage",
        title: "第六关：接近真相",
        info: "你们逐渐还原出事件经过。现在需要在两条解释中选择更合理的一条，才能进入最终验证。",
        question: "你们的最终推理方向是？",
        options: [
          { label: "这是预谋已久的安排", next: "stage10" },
          { label: "这是临时发生的意外", next: "stage10" }
        ]
      },
      stage10: {
        id: "stage10",
        backgroundImage: "",
        backgroundOverlay: "rgba(15, 23, 42, 0.18)",
        type: "stage",
        title: "第七关：最终验证",
        info: "请回到场景中的最终地点，核对最后的机关或提示语。确认无误后，即可进入奖励页面。",
        question: "如果你们已完成现实中的最终步骤，请点击继续。",
        options: [
          { label: "进入最终奖励", next: "reward" }
        ]
      },
      reward: {
        id: "reward",
        backgroundImage: "",
        backgroundOverlay: "rgba(15, 23, 42, 0.18)",
        type: "reward",
        title: "最终奖励",
        rewardTitle: "恭喜通关",
        rewardText: "你们成功完成了本次跑团挑战。真正重要的不是答案本身，而是一路上共同完成推理与探索的过程。请把这段最终信息交给主持人领取奖励。"
      }
    };

    const STAGE_ORDER = [
      "stage1",
      "stage2",
      "stage3",
      "stage4",
      "stage5",
      "stage6",
      "stage7",
      "stage8",
      "stage9",
      "stage10",
      "reward"
    ];

    function getInitialState() {
      return {
        currentId: "home",
        history: [],
        openedGift: false
      };
    }

    let state = loadState();

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return getInitialState();
        return { ...getInitialState(), ...JSON.parse(saved) };
      } catch (error) {
        console.error("读取进度失败", error);
        return getInitialState();
      }
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (error) {
        console.error("保存进度失败", error);
      }
    }

    function getProgress() {
      if (state.currentId === "home") return 0;
      const index = STAGE_ORDER.indexOf(state.currentId);
      if (index === -1) return 0;
      return Math.round(((index + 1) / STAGE_ORDER.length) * 100);
    }

    function goToNode(nextId, optionLabel) {
      if (optionLabel) {
        state.history.push({
          from: state.currentId,
          choice: optionLabel,
          to: nextId
        });
      }
      state.currentId = nextId;
      if (nextId !== "reward") {
        state.openedGift = false;
      }
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goHome() {
      state.currentId = "home";
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetGame() {
      state = getInitialState();
      localStorage.removeItem(STORAGE_KEY);
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderTopbar() {
      const progress = getProgress();
      const badge = document.getElementById("progressBadge");
      const wrap = document.getElementById("progressWrap");
      const bar = document.getElementById("progressBar");

      if (state.currentId === "home") {
        badge.style.display = "none";
        wrap.style.display = "none";
      } else {
        badge.style.display = "inline-flex";
        wrap.style.display = "block";
        badge.textContent = `进度 ${progress}%`;
        bar.style.width = progress + "%";
      }
    }

    function renderHistory() {
      const card = document.getElementById("historyCard");
      const list = document.getElementById("historyList");

      if (!state.history || state.history.length === 0) {
        card.style.display = "none";
        list.innerHTML = "";
        return;
      }

      card.style.display = "block";
      list.innerHTML = state.history.map((item, index) => `
        <div class="history-item">第 ${index + 1} 次选择：${escapeHtml(item.choice)}</div>
      `).join("");
    }

    function renderHome(node) {
      return `
        <div class="card fade-in">
          <div class="card-title">${escapeHtml(node.title)}</div>
          <div class="text">${escapeHtml(node.intro)}</div>

          <div class="section">
            <div class="section-title">游戏说明</div>
            <ul class="tip-list">
              ${node.tips.map(tip => `<li>${escapeHtml(tip)}</li>`).join("")}
            </ul>
          </div>

          <div class="section warning">
            <div class="text">首页可以放：游戏背景、注意事项、主持人提示、队伍编号等信息。</div>
          </div>

          <div style="margin-top:16px;">
            <button class="btn btn-primary" onclick="goToNode('${node.next}')">开始游戏</button>
          </div>
        </div>
      `;
    }

    function renderStage(node) {
      return `
        <div class="card fade-in">
          <div class="card-title smaller">${escapeHtml(node.title)}</div>

          <div class="section">
            <div class="section-title">推理信息</div>
            <div class="text">${escapeHtml(node.info)}</div>
          </div>

          <div class="section primary">
            <div class="section-title">行动提示</div>
            <div class="text">${escapeHtml(node.question)}</div>
          </div>

          <div class="option-list">
            ${node.options.map(option => `
              <button class="btn btn-outline" onclick="goToNode('${option.next}', '${escapeHtml(option.label).replace(/'/g, "&#39;")}')">
                <span>${escapeHtml(option.label)}</span>
                <span class="arrow">›</span>
              </button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderReward(node) {
      const rewardClass = state.openedGift ? "reward-show" : "reward-hidden";
      return `
        <div class="card fade-in reward-wrap">
          <div class="card-title smaller">${escapeHtml(node.title)}</div>
          <div class="text">所有关卡已完成。点击下方礼物盒，领取最终信息。</div>

          <div style="padding: 18px 0 8px;">
            <button class="gift-button" onclick="openGift()" aria-label="打开礼物盒">🎁</button>
          </div>

          <div id="rewardContent" class="section rose ${rewardClass}" style="text-align:left; margin-top: 8px;">
            <div class="section-title">${escapeHtml(node.rewardTitle)}</div>
            <div class="text">${escapeHtml(node.rewardText)}</div>
          </div>
        </div>
      `;
    }

    function openGift() {
      state.openedGift = true;
      saveState();
      render();
    }

    function applyPageBackground(node) {
      const hasImage = node && node.backgroundImage && String(node.backgroundImage).trim() !== "";
      if (hasImage) {
        const overlay = node.backgroundOverlay || "rgba(15, 23, 42, 0.18)";
        document.body.style.background = `linear-gradient(${overlay}, ${overlay}), url("${node.backgroundImage}") center / cover no-repeat fixed`;
      } else {
        document.body.style.background = "linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-1) 100%)";
      }
    }

    function render() {
      const container = document.getElementById("pageContainer");
      const node = STORY_NODES[state.currentId] || STORY_NODES.home;

      applyPageBackground(node);

      renderTopbar();

      if (node.type === "home") {
        container.innerHTML = renderHome(node);
      } else if (node.type === "stage") {
        container.innerHTML = renderStage(node);
      } else if (node.type === "reward") {
        container.innerHTML = renderReward(node);
      }

      renderHistory();
    }

    document.getElementById("homeBtn").addEventListener("click", goHome);
    document.getElementById("resetBtn").addEventListener("click", resetGame);

    render();
  </script>
</body>
</html>
